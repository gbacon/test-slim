name: test

on:
  push:
  pull_request:

jobs:
  perl-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y perl cpanminus build-essential

      - name: Install Perl dependencies
        run: |
          cpanm --notest --verbose --installdeps --cpanfile cpanfile .

      - name: Sanity check modules
        run: |
            perl -MHTML::TreeBuilder -e 1
            perl -MText::CharWidth -e 1

      - name: Run developer tests
        run: |
          chmod +x bin/test-dev
          bin/test-dev