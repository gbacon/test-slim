name: test

on:
  push:
  pull_request:

jobs:
  perl-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Build CI image
        run: |
          docker build -f .devcontainer/Dockerfile -t test-slim-ci .

      - name: Run developer tests in container
        run: |
          docker run --rm \
            -e LANG=C.UTF-8 \
            -e LC_ALL=C.UTF-8 \
            -v "$PWD":/workspaces/test-slim \
            -w /workspaces/test-slim \
            test-slim-ci \
            bin/test-dev
